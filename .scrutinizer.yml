# Scrutinizer CI Configuration
# https://scrutinizer-ci.com/docs/configuration

build:
  environment:
    php:
      version: 8.2

  tests:
    override:
      - command: 'vendor/bin/phpunit --coverage-clover=build/logs/clover.xml'
        coverage:
          file: 'build/logs/clover.xml'
          format: 'clover'

checks:
  php:
    # 基础质量
    code_rating: true
    duplication: true
    no_debug_code: true          # 替代 removal_of_debug_output
    security_vulnerabilities: true

    # 编码规范
    coding_standard: PSR12      # 替代 psr12_strict

    # 代码质量
    unused_parameters: true     # 替代 no_unused_parameters
    unused_variables: true      # 替代 no_unused_variables
    no_empty_statements: true
    no_goto: true
    no_eval: true
    no_exit: true

    # 最佳实践
    verify_property_names: true
    verify_argument_usable_as_reference: true
    verify_access_scope_valid: true

    # 复杂度（新版已移除 method_complexity，使用 too_many_arguments 替代）
    too_many_arguments: true

filter:
  excluded_paths:
    - 'tests/*'
    - 'vendor/*'
    - 'build/*'
    - 'docs/*'

tools:
  php_analyzer: true
  php_code_sniffer:
    config:
      standard: 'PSR12'
    filter:
      paths:
        - 'src/*'
  php_mess_detector:
    filter:
      paths:
        - 'src/*'
  php_cpd:
    filter:
      paths:
        - 'src/*'
  sensiolabs_security_checker: true
  php_sim:
    min_mass: 16
  external_code_coverage:
    timeout: 600

coding_style:
  php:
    indentation:
      default: space
      size: 4
    spaces:
      around_operators:
        concatenation: true
      other:
        after_type_cast: false